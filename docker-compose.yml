services:
  db:
    image: postgres:16
    container_name: collectibles_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: collectibles_vault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  api:
    image: ${IMAGE_TAG:-ghcr.io/collectiblesvault/collectibles-vault-api:latest}
    container_name: collectibles_api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      APP_TITLE: CollectiblesVault API
      DATABASE_URL: postgresql://postgres:postgres@db:5432/collectibles_vault
      JWT_SECRET: ${JWT_SECRET:-super_secret_change_me}
      JWT_ALGORITHM: HS256
      JWT_EXP_MINUTES: "60"
      # Must match StaticFiles mount + save path (see app/core/config.py UPLOAD_DIR)
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      # Файлы на диске хоста (папка ./uploads рядом с docker-compose.yml), не только внутри контейнера.
      - ./uploads:/app/uploads

volumes:
  postgres_data:
