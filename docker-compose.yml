services:
  db:
    image: postgres:16
    container_name: collectibles_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: collectibles_vault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  api:
    image: ${IMAGE_TAG:-ghcr.io/collectiblesvault/collectibles-vault-api:latest}
    container_name: collectibles_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_TITLE: CollectiblesVault API
      DATABASE_URL: postgresql://postgres:postgres@db:5432/collectibles_vault
      JWT_SECRET: ${JWT_SECRET:-super_secret_change_me}
      JWT_ALGORITHM: HS256
      JWT_EXP_MINUTES: "60"
    ports:
      - "8000:8000"

volumes:
  postgres_data:
