services:
  db:
    image: postgres:16
    container_name: collectibles_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: collectibles_vault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  # Re-applies schema when the data volume already existed (init scripts are skipped).
  # Logic is inlined so bind-mounted scripts are not executed (avoids exit 126 on some hosts).
  migrate:
    image: postgres:16
    container_name: collectibles_migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./db/schema.sql:/schema.sql:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        until pg_isready -h db -U postgres >/dev/null 2>&1; do sleep 1; done
        exists=$$(psql -h db -U postgres -d postgres -Atc "SELECT 1 FROM pg_database WHERE datname = 'collectibles_vault'" || true)
        if [ -z "$$exists" ]; then
          psql -h db -U postgres -d postgres -v ON_ERROR_STOP=1 -c 'CREATE DATABASE collectibles_vault;'
        fi
        psql -h db -U postgres -d collectibles_vault -v ON_ERROR_STOP=1 -f /schema.sql

  api:
    image: ${IMAGE_TAG:-ghcr.io/collectiblesvault/collectibles-vault-api:latest}
    container_name: collectibles_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_TITLE: CollectiblesVault API
      DATABASE_URL: postgresql://postgres:postgres@db:5432/collectibles_vault
      JWT_SECRET: ${JWT_SECRET:-super_secret_change_me}
      JWT_ALGORITHM: HS256
      JWT_EXP_MINUTES: "60"
    ports:
      - "8000:8000"

volumes:
  postgres_data:
