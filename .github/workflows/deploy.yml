# Образ Docker собирается ТОЛЬКО здесь (GitHub Actions). Локально docker build не нужен.
# Dockerfile в репо — это описание сборки для раннера; после push в main образ уходит в GHCR.
# На сервере только docker pull + docker compose up (без build).

name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR owner (lowercase)
        id: ghcr
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.ghcr.outputs.owner }}/collectibles-vault-api
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image (GitHub-hosted, no local build)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout (for compose file)
        uses: actions/checkout@v4

      - name: Prepare deploy paths
        id: dep
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "image_tag=ghcr.io/${OWNER}/collectibles-vault-api:latest" >> "$GITHUB_OUTPUT"
          DIR="${{ vars.SERVER_PROJECT_DIR }}"
          if [ -z "$DIR" ]; then
            DIR="${{ secrets.SERVER_PROJECT_DIR }}"
          fi
          if [ -z "$DIR" ]; then
            echo "Set Repository variable SERVER_PROJECT_DIR or secret SERVER_PROJECT_DIR (e.g. /home/pupki/Backend)" >&2
            exit 1
          fi
          echo "project_dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml"
          target: "${{ steps.dep.outputs.project_dir }}/"

      - name: Deploy on server over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            export IMAGE_TAG="${{ steps.dep.outputs.image_tag }}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            cd "${{ steps.dep.outputs.project_dir }}"
            docker compose -f docker-compose.yml pull
            IMAGE_TAG="$IMAGE_TAG" docker compose -f docker-compose.yml up -d --no-build
            docker image prune -f
